# LLM 配置
# LLM Configuration

llm:
  # 默认 provider
  defaultProvider: minimax

  # MiniMax (默认中文)
  minimax:
    apiUrl: https://api.minimax.chat/v1
    model: MiniMax-M2
    temperature: 0.7
    maxTokens: 500
    timeout: 60000

  # OpenAI (英文)
  openai:
    apiUrl: https://api.openai.com/v1
    model: gpt-4
    temperature: 0.7
    maxTokens: 500
    timeout: 60000

  # DeepSeek
  deepseek:
    apiUrl: https://api.deepseek.com/v1
    model: deepseek-chat
    temperature: 0.7
    maxTokens: 500
    timeout: 60000

  # GLM (智谱)
  glm:
    apiUrl: https://open.bigmodel.cn/api/paas/v4
    model: glm-4
    temperature: 0.7
    maxTokens: 500
    timeout: 60000

# 语言到模型的映射
localeModels:
  zh-CN: minimax
  zh-TW: minimax
  en-US: openai
  ja-JP: openai
  ko-KR: openai

# Prompt 模板
prompts:
  # 决策 Prompt
  decision: |
    你是一个在{worldName}中生活的智能体。

    ## 当前状态
    - 名字: {agentName}
    - 精力: {energy}/100
    - 心情: {emotion}
    - 社交需求: {social}/100
    - 成就需求: {achievement}/100
    - 位置: ({positionX}, {positionZ})

    ## 周围环境
    {nearbyAgents}
    {nearbyObjects}
    - 天气: {weather}
    - 时间: {time}

    ## 可用技能
    {skills}

    ## 最近记忆
    {recentMemories}

    ## 你的性格
    {personality}

    ## 任务
    请根据当前状态和可用技能，决定下一步行动。
    只选择一个技能来执行，并提供必要的参数。

    请以 JSON 格式回复：
    {
      "skill": "技能名称",
      "params": { "参数名": "参数值" },
      "reasoning": "你为什么做这个选择"
    }

  # 对话 Prompt
  conversation: |
    你正在和{otherName}交谈。
    你们的关系: {relationship}
    对话历史: {history}
    对方刚说: {message}

    请用{locale}回复，50字以内。
    直接回复你想说的话，不要 JSON。

  # 打招呼 Prompt
  greeting: |
    你是一个叫{name}的智能体。
    你的性格是{性格描述}。
    请用{personalityLanguage}回复。
    简短友好地打招呼。

  # 思考 Prompt
  thinking: |
    你正在思考 {topic}。

    当前情况: {situation}

    请分析并给出你的想法。不需要回复太长，简短思考即可。

# 技能描述
skills:
  move_to:
    name: 移动到指定位置
    description: 让智能体移动到世界中的某个位置。如果你想去见其他智能体或去某个建筑，使用这个技能。
  talk_to:
    name: 与其他智能体交谈
    description: 向另一个智能体发送私信。如果你想和某个智能体交流、问候、获取信息或合作，使用这个技能。
  rest:
    name: 休息
    description: 找一个安静的地方休息，恢复精力。如果累了或者不知道该做什么，可以休息一下。
  explore:
    name: 探索世界
    description: 随机前往一个新的地点探索。探索可能发现有趣的事物或遇到其他智能体。
  interact_world:
    name: 与世界互动
    description: 和世界中的物体或动物互动。可以和花草树木互动，也可以喂小动物。
  visit_building:
    name: 前往建筑使用功能
    description: 前往智体城中的各个建筑。每个建筑有不同功能。
  accept_task:
    name: 接受任务
    description: 从任务中心接受一个任务。完成任务可以获得声誉和奖励。
  complete_task:
    name: 完成任务
    description: 提交当前正在执行的任务，获得声誉和奖励。
