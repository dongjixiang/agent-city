<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>智体城 - WebRTC 测试</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }
    .container {
      max-width: 800px;
      margin: 0 auto;
      background: white;
      border-radius: 16px;
      padding: 30px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
    }
    h1 {
      text-align: center;
      margin-bottom: 20px;
      color: #333;
    }
    .status {
      background: #f5f5f5;
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 20px;
    }
    .status-row {
      display: flex;
      justify-content: space-between;
      padding: 5px 0;
    }
    .status-label { color: #666; }
    .status-value { font-weight: bold; }
    .peers {
      background: #e8f5e9;
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 20px;
    }
    .peer-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px;
      background: white;
      border-radius: 8px;
      margin-bottom: 8px;
    }
    .peer-name { font-weight: bold; }
    .peer-state { 
      padding: 4px 12px;
      border-radius: 12px;
      font-size: 12px;
    }
    .peer-state.connected { background: #4caf50; color: white; }
    .peer-state.connecting { background: #ff9800; color: white; }
    .peer-state.disconnected { background: #9e9e9e; color: white; }
    .messages {
      background: #fff3e0;
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 20px;
      max-height: 300px;
      overflow-y: auto;
    }
    .message {
      padding: 8px 12px;
      margin-bottom: 8px;
      border-radius: 8px;
    }
    .message.sent {
      background: #e3f2fd;
      margin-left: 20px;
    }
    .message.received {
      background: #f1f8e9;
      margin-right: 20px;
    }
    .message-from { font-weight: bold; font-size: 12px; color: #666; }
    .message-text { margin-top: 4px; }
    .controls {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }
    input, button {
      padding: 12px 20px;
      border-radius: 8px;
      border: 2px solid #ddd;
      font-size: 14px;
    }
    input {
      flex: 1;
      outline: none;
    }
    input:focus {
      border-color: #667eea;
    }
    button {
      background: #667eea;
      color: white;
      border: none;
      cursor: pointer;
      font-weight: bold;
    }
    button:hover {
      background: #5a67d8;
    }
    button:disabled {
      background: #ccc;
      cursor: not-allowed;
    }
    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .actions button {
      flex: 1;
      min-width: 120px;
    }
    .log {
      background: #263238;
      color: #4fc3f7;
      padding: 15px;
      border-radius: 8px;
      font-family: monospace;
      font-size: 12px;
      max-height: 200px;
      overflow-y: auto;
    }
    .log-entry { margin-bottom: 4px; }
    .log-time { color: #78909c; }
    .log-info { color: #4fc3f7; }
    .log-success { color: #69f0ae; }
    .log-error { color: #ff5252; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🦐 智体城 - WebRTC P2P 测试</h1>
    
    <div class="status" id="status">
      <div class="status-row">
        <span class="status-label">状态:</span>
        <span class="status-value" id="connection-status">未连接</span>
      </div>
      <div class="status-row">
        <span class="status-label">房间:</span>
        <span class="status-value" id="room-id">-</span>
      </div>
      <div class="status-row">
        <span class="status-label">身份:</span>
        <span class="status-value" id="peer-id">-</span>
      </div>
    </div>
    
    <div class="peers">
      <h3>👥 在线节点</h3>
      <div id="peers-list">
        <p style="color: #666;">暂无其他节点</p>
      </div>
    </div>
    
    <div class="messages" id="messages">
      <p style="color: #666; text-align: center;">暂无消息</p>
    </div>
    
    <div class="controls">
      <input type="text" id="message-input" placeholder="输入消息..." disabled>
      <button id="send-btn" disabled>发送</button>
    </div>
    
    <div class="actions">
      <button id="connect-btn">连接到信令服务器</button>
      <button id="create-room-btn" disabled>创建新房间</button>
      <button id="disconnect-btn" disabled>断开连接</button>
    </div>
    
    <div class="log" id="log"></div>
  </div>

  <script src="webrtc-client.js"></script>
  <script>
    // 元素
    const connectionStatus = document.getElementById('connection-status');
    const roomIdEl = document.getElementById('room-id');
    const peerIdEl = document.getElementById('peer-id');
    const peersList = document.getElementById('peers-list');
    const messagesEl = document.getElementById('messages');
    const messageInput = document.getElementById('message-input');
    const sendBtn = document.getElementById('send-btn');
    const connectBtn = document.getElementById('connect-btn');
    const createRoomBtn = document.getElementById('create-room-btn');
    const disconnectBtn = document.getElementById('disconnect-btn');
    const logEl = document.getElementById('log');
    
    let peer = null;
    let messages = [];
    
    // 日志
    function log(message, type = 'info') {
      const entry = document.createElement('div');
      entry.className = 'log-entry';
      entry.innerHTML = `<span class="log-time">${new Date().toLocaleTimeString()}</span> <span class="log-${type}">${message}</span>`;
      logEl.appendChild(entry);
      logEl.scrollTop = logEl.scrollHeight;
    }
    
    // 更新状态
    function updateStatus() {
      if (peer) {
        connectionStatus.textContent = '已连接';
        connectionStatus.style.color = '#4caf50';
        roomIdEl.textContent = peer.roomId;
        peerIdEl.textContent = peer.agentName;
      } else {
        connectionStatus.textContent = '未连接';
        connectionStatus.style.color = '#f44336';
        roomIdEl.textContent = '-';
        peerIdEl.textContent = '-';
      }
    }
    
    // 更新节点列表
    function updatePeers() {
      if (!peer) return;
      
      const status = peer.getStatus();
      
      if (status.peers.length === 0) {
        peersList.innerHTML = '<p style="color: #666;">暂无其他节点</p>';
      } else {
        peersList.innerHTML = status.peers.map(p => `
          <div class="peer-item">
            <span class="peer-name">${p.agentId.slice(0, 8)}...</span>
            <span class="peer-state ${p.connectionState}">${p.connectionState}</span>
          </div>
        `).join('');
      }
    }
    
    // 添加消息
    function addMessage(from, text, sent = false) {
      messages.push({ from, text, sent, time: Date.now() });
      
      messagesEl.innerHTML = messages.map(m => `
        <div class="message ${m.sent ? 'sent' : 'received'}">
          <div class="message-from">${m.sent ? '我' : m.from.slice(0, 8)}</div>
          <div class="message-text">${m.text}</div>
        </div>
      `).join('');
      
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }
    
    // 连接
    connectBtn.onclick = async () => {
      try {
        log('正在连接到信令服务器...', 'info');
        
        peer = new WebRTCPeer({
          signalingUrl: 'ws://localhost:9878',
          agentName: '浏览器节点'
        });
        
        peer.onPeerJoined = (p) => {
          log(`新节点加入: ${p.name}`, 'success');
          updatePeers();
        };
        
        peer.onPeerLeft = (id) => {
          log(`节点离开: ${id.slice(0, 8)}`, 'info');
          updatePeers();
        };
        
        peer.onMessage = (from, data) => {
          addMessage(from, data.text || data.raw || JSON.stringify(data));
        };
        
        peer.onConnected = (id, name) => {
          log(`P2P 连接建立: ${id.slice(0, 8)}`, 'success');
          updatePeers();
          messageInput.disabled = false;
          sendBtn.disabled = false;
        };
        
        peer.onDisconnected = () => {
          log('断开连接', 'error');
          updatePeers();
          messageInput.disabled = true;
          sendBtn.disabled = true;
        };
        
        const result = await peer.connect();
        log(`已加入房间: ${result.roomId}`, 'success');
        
        updateStatus();
        updatePeers();
        
        connectBtn.disabled = true;
        createRoomBtn.disabled = true;
        disconnectBtn.disabled = false;
        
      } catch (err) {
        log(`连接失败: ${err.message}`, 'error');
      }
    };
    
    // 发送消息
    sendBtn.onclick = () => {
      const text = messageInput.value.trim();
      if (!text) return;
      
      peer.broadcast({ text, from: peer.agentId });
      addMessage(peer.agentId, text, true);
      messageInput.value = '';
    };
    
    messageInput.onkeypress = (e) => {
      if (e.key === 'Enter') sendBtn.click();
    };
    
    // 断开连接
    disconnectBtn.onclick = () => {
      if (peer) {
        peer.disconnect();
        peer = null;
        updateStatus();
        updatePeers();
      }
      
      connectBtn.disabled = false;
      createRoomBtn.disabled = false;
      disconnectBtn.disabled = true;
      messageInput.disabled = true;
      sendBtn.disabled = true;
    };
    
    // 初始化
    updateStatus();
    log('WebRTC 测试页面已加载', 'success');
  </script>
</body>
</html>
