<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>WebSocket 测试</title>
    <style>
        body { font-family: monospace; padding: 20px; background: #1a1a2e; color: #fff; }
        .log { background: #2a2a4e; padding: 10px; margin: 5px 0; border-radius: 5px; }
        .success { color: #4ecdc4; }
        .error { color: #ff6b6b; }
        button { padding: 10px 20px; margin: 10px 5px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>🔌 WebSocket 连接测试</h1>
    <div>
        <button onclick="connect()">连接 WebSocket</button>
        <button onclick="getList()">获取在线列表</button>
        <button onclick="clearLog()">清空日志</button>
    </div>
    <div id="log"></div>
    
    <script>
        let ws = null;
        
        function log(msg, type = '') {
            const el = document.createElement('div');
            el.className = 'log ' + type;
            el.textContent = new Date().toLocaleTimeString() + ' ' + msg;
            document.getElementById('log').appendChild(el);
        }
        
        function connect() {
            if (ws) {
                ws.close();
            }
            
            log('正在连接 ws://localhost:9876 ...');
            
            ws = new WebSocket('ws://localhost:9876');
            
            ws.onopen = () => {
                log('✅ 连接成功!', 'success');
                // 注册为观察者
                ws.send(JSON.stringify({
                    type: 'REGISTER',
                    name: '🧪 测试客户端',
                    tags: ['test']
                }));
            };
            
            ws.onmessage = (event) => {
                const msg = JSON.parse(event.data);
                log('📥 收到: ' + JSON.stringify(msg).slice(0, 100), 'success');
            };
            
            ws.onerror = (err) => {
                log('❌ 错误: ' + err, 'error');
            };
            
            ws.onclose = () => {
                log('🔌 连接已关闭');
            };
        }
        
        function getList() {
            if (!ws || ws.readyState !== WebSocket.OPEN) {
                log('❌ 未连接', 'error');
                return;
            }
            ws.send(JSON.stringify({ type: 'LIST' }));
            log('📤 发送: LIST');
        }
        
        function clearLog() {
            document.getElementById('log').innerHTML = '';
        }
        
        // 自动连接
        setTimeout(connect, 500);
    </script>
</body>
</html>
